<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfleet Central Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00e5ff; /* Bright Neon Cyan */
            --secondary: #0044aa; /* Deep Blue */
            --dark: #020611; /* Space Black */
            --bg-glow: rgba(0, 229, 255, 0.15);
        }
        body {
            background-color: var(--dark);
            background-image: radial-gradient(circle at center, #061639 0%, var(--dark) 100%);
            color: var(--primary);
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        /* The Holographic Grid Background */
        .grid-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }
        /* The Main Tactical Display Box */
        .hud-container {
            position: relative;
            border: 2px solid var(--secondary);
            padding: 50px 70px;
            background: rgba(2, 6, 17, 0.7);
            box-shadow: 0 0 30px var(--bg-glow), inset 0 0 20px rgba(0, 68, 170, 0.5);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            backdrop-filter: blur(5px);
        }
        /* The Targeting Brackets in the corners */
        .hud-container::before, .hud-container::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }
        .hud-container::before {
            top: -3px; left: -3px;
            border-right: none; border-bottom: none;
        }
        .hud-container::after {
            bottom: -3px; right: -3px;
            border-left: none; border-top: none;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--secondary);
            padding-bottom: 5px;
            color: #88ccff;
            letter-spacing: 4px;
        }
        h1 {
            font-size: 2.5rem;
            margin: 0 0 15px 0;
            font-weight: 700;
            text-shadow: 0 0 20px var(--primary);
        }
        .pulse-text {
            font-size: 1.5rem;
            font-weight: 600;
            animation: pulse 2s infinite;
            margin-bottom: 15px;
        }
        .sub-text {
            font-size: 1.1rem;
            color: #88ccff;
        }
        @keyframes pulse {
            0% { opacity: 0.4; text-shadow: none; }
            50% { opacity: 1; text-shadow: 0 0 25px var(--primary); }
            100% { opacity: 0.4; text-shadow: none; }
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="hud-container">
        <div class="status-bar">
            <span>SEC-31 UPLINK</span>
            <span>STATUS: STANDBY</span>
        </div>
        <h1>[ SYSTEM UPDATE IN PROGRESS ]</h1>
        <div class="pulse-text">CENTRAL COMMAND MAINTENANCE MODE</div>
        <div class="sub-text">CONTACT YOUR COMMAND FOR FURTHER INSTRUCTION</div>
    </div>
</body>
</html>
